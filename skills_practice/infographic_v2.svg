<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" style="background:#FFF8F0">
  <defs>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="#FFF8F0"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#2d2d2d" font-weight="bold">Stop Buying Random Arduino Modules</text>
  <text x="600" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#666">A Scenario-Based Selection Map for HCI Projects</text>
  
  <!-- Card 1: Proximity -->
  <g filter="url(#shadow)" transform="translate(40,100)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#a5d8ff" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#a5d8ff"/>
    <rect x="0" y="10" width="350" height="30" fill="#a5d8ff"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Proximity Detection</text>
    <circle cx="60" cy="85" r="30" fill="#a5d8ff" stroke="#1e40af" stroke-width="2"/>
    <text x="60" y="90" text-anchor="middle" font-family="monospace" font-size="16" fill="#1e40af">◎</text>
    <path d="M60,85 L100,85 L115,70" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="4"/>
    <path d="M60,85 L100,85 L115,100" stroke="#666" stroke-width="2" fill="none" stroke-dasharray="4"/>
    <text x="140" y="72" font-family="Georgia,serif" font-size="14" fill="#1e40af" font-weight="bold">HC-SR04</text>
    <text x="140" y="90" font-family="Georgia,serif" font-size="12" fill="#666">Ultrasonic 2-400cm</text>
    <text x="140" y="106" font-family="Georgia,serif" font-size="12" fill="#666">5V | 4-pin interface</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#a5d8ff" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#1e40af">VL53L0X: Laser ToF, 1m, I2C</text>
    <text x="175" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#1e40af">APDS-9960: IR Gesture, I2C, 3.3V</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">→ triggers LED when person detected</text>
  </g>
  
  <!-- Card 2: Motion -->
  <g filter="url(#shadow)" transform="translate(425,100)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#b2f2bb" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#b2f2bb"/>
    <rect x="0" y="10" width="350" height="30" fill="#b2f2bb"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Motion Detection</text>
    <rect x="35" y="55" width="80" height="55" rx="8" fill="#b2f2bb" opacity="0.3"/>
    <ellipse cx="75" cy="75" rx="20" ry="25" fill="#b2f2bb" opacity="0.5"/>
    <text x="75" y="82" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#166534">👤</text>
    <path d="M75,115 L75,140 Q75,150 85,145" stroke="#666" stroke-width="2" fill="none"/>
    <path d="M55,135 L75,145 L95,130" stroke="#b2f2bb" stroke-width="3" fill="none"/>
    <text x="140" y="72" font-family="Georgia,serif" font-size="14" fill="#166534" font-weight="bold">HC-SR501</text>
    <text x="140" y="90" font-family="Georgia,serif" font-size="12" fill="#666">PIR infrared</text>
    <text x="140" y="106" font-family="Georgia,serif" font-size="12" fill="#666">7m range | 5V</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#b2f2bb" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#166534">AM312: Mini PIR, 3m range</text>
    <text x="175" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#166534">Low power standby mode</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">→ activates buzzer on movement</text>
  </g>
  
  <!-- Card 3: Environment -->
  <g filter="url(#shadow)" transform="translate(810,100)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#d0bfff" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#d0bfff"/>
    <rect x="0" y="10" width="350" height="30" fill="#d0bfff"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Environment Sense</text>
    <circle cx="60" cy="80" r="22" fill="#d0bfff"/>
    <text x="60" y="86" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#7c3aed">🌡</text>
    <circle cx="60" cy="115" r="22" fill="#d0bfff"/>
    <text x="60" y="121" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#7c3aed">💧</text>
    <text x="120" y="72" font-family="Georgia,serif" font-size="14" fill="#7c3aed" font-weight="bold">DHT22</text>
    <text x="120" y="90" font-family="Georgia,serif" font-size="12" fill="#666">Temp + Humidity</text>
    <text x="120" y="106" font-family="Georgia,serif" font-size="12" fill="#666">±0.5°C | 5V</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#d0bfff" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#7c3aed">BME280: +Pressure, I2C/SPI, 3.3V</text>
    <text x="175" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#7c3aed">DS18B20: Waterproof, 1-wire</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">→ controls fan relay</text>
  </g>
  
  <!-- Card 4: Touch -->
  <g filter="url(#shadow)" transform="translate(40,330)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#ffd8a8" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#ffd8a8"/>
    <rect x="0" y="10" width="350" height="30" fill="#ffd8a8"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Touch Input</text>
    <rect x="35" y="55" width="75" height="75" rx="8" fill="#ffd8a8" opacity="0.4"/>
    <text x="72" y="100" text-anchor="middle" font-family="Georgia,serif" font-size="40" fill="#c2410c">👆</text>
    <text x="140" y="72" font-family="Georgia,serif" font-size="14" fill="#c2410c" font-weight="bold">TTP223</text>
    <text x="140" y="90" font-family="Georgia,serif" font-size="12" fill="#666">Capacitive touch</text>
    <text x="140" y="106" font-family="Georgia,serif" font-size="12" fill="#666">2 touch points</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#ffd8a8" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c2410c">MPR121: 12-touch, I2C, 3.3V</text>
    <text x="175" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c2410c">Multi-touch capability</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">→ opens servo gate</text>
  </g>
  
  <!-- Card 5: Sound -->
  <g filter="url(#shadow)" transform="translate(425,330)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#c3fae8" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#c3fae8"/>
    <rect x="0" y="10" width="350" height="30" fill="#c3fae8"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Sound Input</text>
    <path d="M30,105 Q50,55 70,105 Q90,155 110,105 Q130,55 150,105 Q170,155 190,105 Q210,55 230,105" stroke="#0f766e" stroke-width="3" fill="none"/>
    <text x="70" y="50" font-family="Georgia,serif" font-size="22" fill="#0f766e">🔊</text>
    <text x="260" y="72" font-family="Georgia,serif" font-size="14" fill="#0f766e" font-weight="bold">KY-038</text>
    <text x="260" y="90" font-family="Georgia,serif" font-size="12" fill="#666">Analog level</text>
    <text x="260" y="106" font-family="Georgia,serif" font-size="12" fill="#666">Threshold output</text>
    <line x1="20" y1="125" x2="330" y2="125" stroke="#c3fae8" stroke-width="1" stroke-dasharray="4"/>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#0f766e">MAX9814: Amplified mic</text>
    <text x="175" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#0f766e">Auto gain control</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">→ changes LED pattern</text>
  </g>
  
  <!-- Card 6: Output -->
  <g filter="url(#shadow)" transform="translate(810,330)">
    <rect width="350" height="200" rx="12" fill="white" stroke="#ffc9c9" stroke-width="2"/>
    <rect x="0" y="0" width="350" height="40" rx="12" fill="#ffc9c9"/>
    <rect x="0" y="10" width="350" height="30" fill="#ffc9c9"/>
    <text x="175" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="white" font-weight="bold">Output Modules</text>
    <g transform="translate(25,50)">
      <rect x="0" y="0" width="65" height="65" rx="8" fill="#ffc9c9" opacity="0.4"/>
      <text x="32" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="28">💡</text>
      <text x="32" y="58" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">WS2812B</text>
    </g>
    <g transform="translate(105,50)">
      <rect x="0" y="0" width="65" height="65" rx="8" fill="#ffc9c9" opacity="0.4"/>
      <text x="32" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="28">⚙️</text>
      <text x="32" y="58" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Servo</text>
    </g>
    <g transform="translate(185,50)">
      <rect x="0" y="0" width="65" height="65" rx="8" fill="#ffc9c9" opacity="0.4"/>
      <text x="32" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="28">🔌</text>
      <text x="32" y="58" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Relay</text>
    </g>
    <g transform="translate(265,50)">
      <rect x="0" y="0" width="65" height="65" rx="8" fill="#ffc9c9" opacity="0.4"/>
      <text x="32" y="35" text-anchor="middle" font-family="Georgia,serif" font-size="28">🔔</text>
      <text x="32" y="58" text-anchor="middle" font-family="monospace" font-size="10" fill="#333">Buzzer</text>
    </g>
    <text x="175" y="145" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#b91c1c" font-weight="bold">All connect to ESP32/Arduino</text>
    <text x="175" y="165" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#666">3.3V or 5V logic level</text>
    <text x="175" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#999">PWM for LEDs | Digital for relay</text>
  </g>
  
  <!-- Flow diagram bottom -->
  <g transform="translate(40,560)">
    <rect width="320" height="55" rx="27" fill="#a5d8ff" opacity="0.5"/>
    <text x="160" y="25" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#1e40af" font-weight="bold">INPUT</text>
    <text x="160" y="43" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">HC-SR04 | PIR | DHT22 | TTP223 | Sound</text>
  </g>
  <text x="395" y="587" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#666" font-weight="bold">→</text>
  <g transform="translate(430,560)">
    <rect width="340" height="55" rx="27" fill="#b2f2bb" opacity="0.5"/>
    <text x="170" y="25" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#166534" font-weight="bold">PROCESSING</text>
    <text x="170" y="43" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">ESP32 / Arduino Uno</text>
  </g>
  <text x="805" y="587" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#666" font-weight="bold">→</text>
  <g transform="translate(840,560)">
    <rect width="320" height="55" rx="27" fill="#d0bfff" opacity="0.5"/>
    <text x="160" y="25" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#7c3aed" font-weight="bold">OUTPUT</text>
    <text x="160" y="43" text-anchor="middle" font-family="monospace" font-size="11" fill="#7c3aed">LED Strip | Servo | Relay | Buzzer</text>
  </g>
  
  <!-- Tape corners -->
  <rect x="15" y="88" width="45" height="16" fill="#f5e6c8" opacity="0.8" transform="rotate(-6,37,96)"/>
  <rect x="1140" y="88" width="45" height="16" fill="#f5e6c8" opacity="0.8" transform="rotate(6,1162,96)"/>
  <rect x="15" y="548" width="45" height="16" fill="#f5e6c8" opacity="0.8" transform="rotate(-6,37,556)"/>
  <rect x="1140" y="548" width="45" height="16" fill="#f5e6c8" opacity="0.8" transform="rotate(6,1162,556)"/>
  
  <!-- Footer -->
  <text x="600" y="640" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#aaa">baoyu-infographic skill | bento-grid + craft-handmade | /opt/data/skills/creative/baoyu-infographic</text>
</svg>